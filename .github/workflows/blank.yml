from selenium import webdriver
from selenium.webdriver.common.by import By
import pandas as pd
import time
import re

driver = webdriver.Chrome()
driver.get("https://www.chase.com/locator/us/pa")
time.sleep(5)

links = set()

# Scroll to load all branches
for _ in range(15):
    driver.execute_script("window.scrollTo(0, document.body.scrollHeight);")
    time.sleep(2)

elements = driver.find_elements(By.TAG_NAME, "a")

for el in elements:
    href = el.get_attribute("href")
    if href and "/locator/banking/us/pa/" in href:
        links.add(href.split("?")[0])

data = []

phone_pattern = re.compile(r'\(?\d{3}\)?[-.\s]?\d{3}[-.\s]?\d{4}')

for link in links:
    driver.get(link)
    time.sleep(2)

    page = driver.find_element(By.TAG_NAME, "body").text

    name = driver.find_element(By.TAG_NAME, "h1").text

    phone_match = phone_pattern.search(page)
    phone = phone_match.group() if phone_match else ""

    lines = page.split("\n")
    address = ""
    for line in lines:
        if "PA" in line and any(char.isdigit() for char in line):
            address = line
            break

    data.append({
        "Branch Name": name,
        "Address": address,
        "Phone": phone
    })

driver.quit()

df = pd.DataFrame(data)
df.drop_duplicates(inplace=True)
df.to_csv("PA_Chase_Branches.csv", index=False)
df.to_excel("PA_Chase_Branches.xlsx", index=False)

print("Done. Files created:")
print("PA_Chase_Branches.csv")
print("PA_Chase_Branches.xlsx")
